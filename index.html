<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do List</title>
  <!-- Inline script to set data-theme before render, preventing FOUC for stored dark mode preference -->
  <script>
    (function() {
      var stored = localStorage.getItem('darkMode');
      var dark = stored === 'true'
        || (stored === null && window.matchMedia('(prefers-color-scheme: dark)').matches);
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    })();
  </script>
  <!-- FontAwesome Icons for UI elements -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
    integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- Google Fonts: Poppins for a modern, clean typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500&display=swap" rel="stylesheet">
  <style>
    /* ============================================
       CSS Custom Properties for Theming
    ============================================ */
    :root {
      --bg-body: linear-gradient(135deg, #e0f2fe 0%, #f0f4ff 50%, #ede9fe 100%);
      --bg-card: rgba(255, 255, 255, 0.75);
      --bg-input: #fff;
      --text-primary: #1e293b;
      --text-muted: #94a3b8;
      --border-color: #e2e8f0;
      --accent: #0ea5e9;
      --accent-hover: #0284c7;
      --shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(0,0,0,0.08);
    }
    /* KEEP IN SYNC: [data-theme="dark"] and the @media block below must have identical values */
    [data-theme="dark"] {
      --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --bg-card: rgba(30, 41, 59, 0.85);
      --bg-input: rgba(51, 65, 85, 0.6);
      --text-primary: #e2e8f0;
      --text-muted: #64748b;
      --border-color: #334155;
      --accent: #38bdf8;
      --accent-hover: #0ea5e9;
      --shadow: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
    }
    /* KEEP IN SYNC: values below must match [data-theme="dark"] above */
    @media (prefers-color-scheme: dark) {
      :root:not([data-theme="light"]) {
        --bg-body: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
        --bg-card: rgba(30, 41, 59, 0.85);
        --bg-input: rgba(51, 65, 85, 0.6);
        --text-primary: #e2e8f0;
        --text-muted: #64748b;
        --border-color: #334155;
        --accent: #38bdf8;
        --accent-hover: #0ea5e9;
        --shadow: 0 8px 32px rgba(0,0,0,0.3), 0 2px 8px rgba(0,0,0,0.2);
      }
    }

    /* ============================================
       Global Reset and Base Styles
    ============================================ */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Poppins', sans-serif;
      background: var(--bg-body);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ============================================
       Main Container Styles (Glassmorphism)
    ============================================ */
    .todo-container {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      width: 100%;
      max-width: 600px;
      border-radius: 10px;
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,0.2);
      padding: 30px 40px;
      transition: box-shadow 0.3s ease;
    }
    .todo-container:hover { box-shadow: 0 12px 40px rgba(0,0,0,0.16), 0 4px 12px rgba(0,0,0,0.1); }

    /* ============================================
       Header Row (Title + Dark Mode Toggle)
    ============================================ */
    .header-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }
    .header-row h1 {
      margin-bottom: 0;
      font-size: 1.9rem;
      font-weight: 500;
      color: var(--text-primary);
    }
    .dark-mode-btn {
      background: transparent;
      border: 1px solid var(--border-color);
      border-radius: 50%;
      width: 38px;
      height: 38px;
      cursor: pointer;
      color: var(--text-primary);
      font-size: 1rem;
      transition: background 0.3s, color 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .dark-mode-btn:hover { background: var(--border-color); }

    /* ============================================
       Input Section Styles
    ============================================ */
    .input-section {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }
    .input-section input[type="text"] {
      flex: 1 1 280px;
      padding: 12px 14px;
      font-size: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text-primary);
      transition: border-color 0.3s;
    }
    .input-section input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    .input-section select {
      flex: 0 0 120px;
      padding: 12px 10px;
      font-size: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text-primary);
      transition: border-color 0.3s;
    }
    .input-section select:focus {
      outline: none;
      border-color: var(--accent);
    }
    /* Add Todo Button - Accent Color */
    .input-section button {
      flex: 0 0 auto;
      background: linear-gradient(135deg, var(--accent), var(--accent-hover));
      border: none;
      color: #fff;
      padding: 0 16px;
      font-size: 1.1rem;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.3s, transform 0.2s;
    }
    .input-section button:hover {
      transform: scale(1.04);
      filter: brightness(1.1);
    }

    /* ============================================
       Filter Section Styles
    ============================================ */
    .filters {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 24px;
    }
    .filter-btns {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .filter-btns button,
    .clear-btn {
      padding: 8px 12px;
      font-size: 0.9rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      background: var(--bg-input);
      color: var(--text-primary);
      cursor: pointer;
      transition: background 0.3s, color 0.3s;
    }
    .filter-btns button.active,
    .filter-btns button:hover {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }
    .clear-btn {
      border-color: #e74c3c;
      color: #e74c3c;
    }
    .clear-btn:hover {
      background: #e74c3c;
      color: #fff;
    }

    /* ============================================
       Todo List Styles
    ============================================ */
    .todo-list {
      list-style: none;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 4px;
    }
    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.3s;
    }
    .todo-item:last-child { border-bottom: none; }
    .todo-item:hover { background: rgba(14, 165, 233, 0.04); }
    .todo-text {
      display: flex;
      align-items: center;
      gap: 10px;
      flex: 1;
      font-size: 1rem;
      word-break: break-word;
    }
    .todo-text.completed .text-content {
      color: var(--text-muted);
    }

    /* Strikethrough Animation */
    .todo-text .text-content {
      position: relative;
      display: inline-block;
    }
    .todo-text .text-content::after {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      height: 2px;
      background: var(--text-muted);
      width: 0;
      transition: width 0.4s ease;
    }
    .todo-text.completed .text-content::after {
      width: 100%;
    }

    /* ============================================
       Priority Indicator Styles
    ============================================ */
    .priority-indicator {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      display: inline-block;
      flex-shrink: 0;
      cursor: pointer;
    }
    .priority-low { background: #4caf50; }
    .priority-medium { background: #ff9800; }
    .priority-high { background: #e74c3c; }

    /* ============================================
       Todo Actions Styles (Hover/Focus States)
    ============================================ */
    .todo-actions button {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 1rem;
      margin-left: 8px;
      color: var(--text-muted);
      transition: background 0.2s, color 0.2s;
    }
    .todo-actions .edit-btn:hover {
      background: rgba(14, 165, 233, 0.12);
      color: var(--accent);
    }
    .todo-actions .edit-btn:focus {
      background: rgba(14, 165, 233, 0.12);
      color: var(--accent);
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }
    .todo-actions .delete-btn:hover {
      background: rgba(220, 38, 38, 0.12);
      color: #dc2626;
    }
    .todo-actions .delete-btn:focus {
      background: rgba(220, 38, 38, 0.12);
      color: #dc2626;
      outline: 2px solid #dc2626;
      outline-offset: 2px;
    }

    /* ============================================
       Empty State Styles
    ============================================ */
    .empty-state {
      list-style: none;
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state i {
      font-size: 3rem;
      margin-bottom: 12px;
      opacity: 0.5;
      display: block;
    }
    .empty-state p {
      font-size: 1.1rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    .empty-state span {
      font-size: 0.85rem;
      opacity: 0.75;
    }

    /* ============================================
       Modal Styles
    ============================================ */
    .modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
      padding: 20px;
      z-index: 1000;
    }
    .modal.active { display: flex; }
    .modal-content {
      background: var(--bg-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 6px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .modal-content h2 {
      text-align: center;
      margin-bottom: 16px;
      font-size: 1.5rem;
      color: var(--text-primary);
    }
    .modal-content input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      font-size: 1rem;
      border: 1px solid var(--border-color);
      border-radius: 6px;
      margin-bottom: 16px;
      background: var(--bg-input);
      color: var(--text-primary);
      transition: border-color 0.3s;
    }
    .modal-content input[type="text"]:focus {
      outline: none;
      border-color: var(--accent);
    }
    .modal-actions { text-align: right; }
    .modal-actions button {
      padding: 8px 12px;
      font-size: 0.9rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-left: 8px;
      transition: background 0.3s;
    }
    .modal-actions .save-btn { background: var(--accent); color: #fff; }
    .modal-actions .save-btn:hover { background: var(--accent-hover); }
    .modal-actions .cancel-btn { background: var(--border-color); color: var(--text-primary); }
    .modal-actions .cancel-btn:hover { opacity: 0.8; }

    /* ============================================
       Toast Notification Styles
    ============================================ */
    .toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1100;
      max-width: calc(100% - 40px);
    }
    .toast {
      display: flex;
      align-items: center;
      color: #fff;
      padding: 10px 14px;
      border-radius: 6px;
      margin-top: 8px;
      font-size: 0.9rem;
      opacity: 0;
      animation: toastIn 0.4s forwards, toastOut 0.4s forwards 3s;
      word-wrap: break-word;
    }
    .toast i { margin-right: 8px; flex-shrink: 0; }
    .toast-success { background: #16a34a; }
    .toast-error { background: #dc2626; }
    .toast-info { background: #0ea5e9; }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastOut {
      from { opacity: 1; }
      to { opacity: 0; }
    }

    /* ============================================
       Todo Item Animations
    ============================================ */
    @keyframes slideInFromLeft {
      from { opacity: 0; transform: translateX(-24px); }
      to { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeOutRight {
      from { opacity: 1; transform: translateX(0) scaleY(1); }
      to { opacity: 0; transform: translateX(24px) scaleY(0); max-height: 0; padding: 0; margin: 0; }
    }
    .todo-item.entering {
      animation: slideInFromLeft 0.3s ease forwards;
    }
    .todo-item.removing {
      animation: fadeOutRight 0.3s ease forwards;
      overflow: hidden;
    }
    /* Ensure animationend fires for reduced-motion users so deleteTodo completes */
    @media (prefers-reduced-motion: reduce) {
      .todo-item.removing {
        animation-duration: 0.01s;
      }
    }

    /* ============================================
       Footer Styles
    ============================================ */
    footer {
      margin-top: 20px;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }
    footer a {
      color: var(--text-muted);
      text-decoration: none;
      transition: color 0.3s;
    }
    footer a:hover { color: var(--accent); }

    /* ============================================
       Responsive Layout Adjustments
    ============================================ */
    @media (max-width: 768px) {
      .todo-container { padding: 25px 30px; }
      .header-row h1 { font-size: 1.8rem; }
      .input-section input[type="text"],
      .input-section select { font-size: 0.95rem; }
      .input-section button { font-size: 1rem; }
    }
    @media (max-width: 480px) {
      .filters { flex-direction: column; }
      .filter-btns { justify-content: center; }
      .clear-btn { width: 100%; }
    }
  </style>
</head>
<body>
  <!-- Main Application Container -->
  <div class="todo-container">
    <div class="header-row">
      <h1>To-Do List</h1>
      <button class="dark-mode-btn" id="darkModeBtn" aria-label="Toggle dark mode">
        <i class="fas fa-moon"></i>
      </button>
    </div>
    <!-- Input Section: New Todo, Priority Selection, and Add Button -->
    <div class="input-section">
      <input type="text" id="todoInput" placeholder="Add a new task..." />
      <select id="todoPriority">
        <option value="low">Low</option>
        <option value="medium" selected>Medium</option>
        <option value="high">High</option>
      </select>
      <button id="addTodoBtn"><i class="fas fa-plus"></i></button>
    </div>
    <!-- Filters Section: Buttons for filtering todos -->
    <div class="filters">
      <div class="filter-btns">
        <button data-filter="all" class="active">All</button>
        <button data-filter="active">Active</button>
        <button data-filter="completed">Completed</button>
      </div>
      <button class="clear-btn" id="clearCompletedBtn">Clear Completed</button>
    </div>
    <!-- Todo List -->
    <ul class="todo-list" id="todoList">
      <!-- Todos are dynamically injected here -->
    </ul>
  </div>

  <!-- Edit Modal for Updating Todos -->
  <div class="modal" id="editModal">
    <div class="modal-content">
      <h2>Edit Todo</h2>
      <input type="text" id="editTodoInput" placeholder="Edit todo..." />
      <div class="modal-actions">
        <button class="cancel-btn" id="cancelEditBtn">Cancel</button>
        <button class="save-btn" id="saveEditBtn">Save</button>
      </div>
    </div>
  </div>

  <!-- Toast Container for Notifications -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- Footer with GitHub Link -->
  <footer>
    &copy; 2025 Ramazan &Ccedil;etinkaya <a href="https://github.com/ramazancetinkaya/simple-todolist" target="_blank">View on GitHub</a>
  </footer>

  <script>
    /***************************************************
     * Dark Mode — data-theme was already set in <head> to prevent FOUC.
     * Here we sync the toggle icon and wire up the click handler.
     ***************************************************/
    const darkModeBtn = document.getElementById('darkModeBtn');
    // Read the theme that was applied early in <head>
    let isDarkMode = document.documentElement.getAttribute('data-theme') === 'dark';

    function applyDarkMode(dark) {
      document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      darkModeBtn.querySelector('i').className = dark ? 'fas fa-sun' : 'fas fa-moon';
      localStorage.setItem('darkMode', dark);
    }

    darkModeBtn.addEventListener('click', () => {
      isDarkMode = !isDarkMode;
      applyDarkMode(isDarkMode);
    });

    // Sync icon to match the data-theme already applied by <head> script
    darkModeBtn.querySelector('i').className = isDarkMode ? 'fas fa-sun' : 'fas fa-moon';

    /***************************************************
     * Validation Regex and Character Limits
     ***************************************************/
    const todoRegex = /^[A-Za-z0-9][A-Za-z0-9 ,.!?'"-]{2,99}$/;
    const MIN_LENGTH = 3, MAX_LENGTH = 100;

    /***************************************************
     * Local Storage Key and Application State Variables
     ***************************************************/
    const STORAGE_KEY = 'todos';
    let currentFilter = 'all';
    let todos = [];
    let editTodoId = null;
    let lastDeletedTodo = null;
    let lastDeletedTimer = null;
    const UNDO_DURATION = 5000;

    /***************************************************
     * DOM Element References
     ***************************************************/
    const todoInput = document.getElementById('todoInput');
    const todoPriority = document.getElementById('todoPriority');
    const addTodoBtn = document.getElementById('addTodoBtn');
    const todoList = document.getElementById('todoList');
    const editModal = document.getElementById('editModal');
    const editTodoInput = document.getElementById('editTodoInput');
    const cancelEditBtn = document.getElementById('cancelEditBtn');
    const saveEditBtn = document.getElementById('saveEditBtn');
    const toastContainer = document.getElementById('toastContainer');
    const filterButtons = document.querySelectorAll('.filter-btns button');
    const clearCompletedBtn = document.getElementById('clearCompletedBtn');

    /***************************************************
     * Function: isValidTodo
     ***************************************************/
    function isValidTodo(text) { return todoRegex.test(text); }

    /***************************************************
     * Priority Order and Helper Functions
     ***************************************************/
    const priorityOrder = { high: 3, medium: 2, low: 1 };
    function getNextPriority(current) {
      if(current === 'high') return 'medium';
      if(current === 'medium') return 'low';
      return 'high';
    }

    /***************************************************
     * Function: init
     ***************************************************/
    function init() {
      const storedTodos = localStorage.getItem(STORAGE_KEY);
      if(storedTodos) { todos = JSON.parse(storedTodos); }
      renderTodos();
    }

    /***************************************************
     * Function: renderTodos
     ***************************************************/
    function renderTodos() {
      const sortedTodos = [...todos].sort((a, b) => priorityOrder[b.priority] - priorityOrder[a.priority]);
      let filteredTodos = [];
      if(currentFilter === 'all') { filteredTodos = sortedTodos; }
      else if(currentFilter === 'active') { filteredTodos = sortedTodos.filter(todo => !todo.completed); }
      else if(currentFilter === 'completed') { filteredTodos = sortedTodos.filter(todo => todo.completed); }
      todoList.innerHTML = '';
      if(filteredTodos.length === 0) {
        todoList.innerHTML = `
          <li class="empty-state">
            <i class="fas fa-clipboard-list"></i>
            <p>No tasks yet!</p>
            <span>Add your first task above</span>
          </li>
        `;
        return;
      }
      filteredTodos.forEach(todo => {
        const li = document.createElement('li');
        li.className = 'todo-item';
        li.dataset.id = todo.id;

        const todoTextDiv = document.createElement('div');
        todoTextDiv.className = 'todo-text';
        if(todo.completed) { todoTextDiv.classList.add('completed'); }

        const checkIcon = document.createElement('i');
        checkIcon.className = todo.completed ? 'fas fa-check-circle' : 'far fa-circle';
        checkIcon.style.cursor = 'pointer';
        checkIcon.addEventListener('click', () => toggleComplete(todo.id));

        const textContent = document.createElement('span');
        textContent.className = 'text-content';
        textContent.textContent = todo.text;

        const priorityIndicator = document.createElement('span');
        priorityIndicator.classList.add('priority-indicator');
        if(todo.priority === 'high'){ priorityIndicator.classList.add('priority-high'); }
        else if(todo.priority === 'medium'){ priorityIndicator.classList.add('priority-medium'); }
        else { priorityIndicator.classList.add('priority-low'); }
        priorityIndicator.addEventListener('click', () => {
          todo.priority = getNextPriority(todo.priority);
          saveTodos();
          renderTodos();
        });

        todoTextDiv.appendChild(checkIcon);
        todoTextDiv.appendChild(priorityIndicator);
        todoTextDiv.appendChild(textContent);

        const actionsDiv = document.createElement('div');
        actionsDiv.className = 'todo-actions';
        const editBtn = document.createElement('button');
        editBtn.className = 'edit-btn';
        editBtn.innerHTML = '<i class="fas fa-edit"></i>';
        editBtn.addEventListener('click', () => openEditModal(todo.id));
        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'delete-btn';
        deleteBtn.innerHTML = '<i class="fas fa-trash-alt"></i>';
        deleteBtn.addEventListener('click', () => deleteTodo(todo.id));
        actionsDiv.appendChild(editBtn);
        actionsDiv.appendChild(deleteBtn);

        li.appendChild(todoTextDiv);
        li.appendChild(actionsDiv);
        todoList.appendChild(li);
      });
    }

    /***************************************************
     * Function: saveTodos
     ***************************************************/
    function saveTodos() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(todos));
    }

    /***************************************************
     * Function: addTodo
     ***************************************************/
    function addTodo() {
      const text = todoInput.value.trim();
      if(text.length < MIN_LENGTH || text.length > MAX_LENGTH) {
        showToast(`Todo must be between ${MIN_LENGTH} and ${MAX_LENGTH} characters.`, null, 'error');
        return;
      }
      if(!isValidTodo(text)) {
        showToast('Invalid characters or todo cannot start with punctuation.', null, 'error');
        return;
      }
      const newTodo = {
        id: Date.now(),
        text,
        completed: false,
        priority: todoPriority.value
      };
      todos.push(newTodo);
      saveTodos();
      renderTodos();
      // Animate only the newly added item
      const newLi = todoList.querySelector(`.todo-item[data-id="${newTodo.id}"]`);
      if(newLi) {
        newLi.classList.add('entering');
        newLi.addEventListener('animationend', () => newLi.classList.remove('entering'), { once: true });
      }
      todoInput.value = '';
      todoPriority.value = 'medium';
      showToast('Todo added successfully!', null, 'success');
    }

    /***************************************************
     * Function: deleteTodo
     ***************************************************/
    function deleteTodo(id) {
      const todoToDelete = todos.find(todo => todo.id === id);
      if(!todoToDelete) return;

      let undone = false; // flag chia sẻ giữa undo callback và animationend

      const li = todoList.querySelector(`.todo-item[data-id="${id}"]`);
      if(li) {
        li.style.maxHeight = li.offsetHeight + 'px'; // pin actual height trước khi animate
        li.classList.add('removing');
        li.addEventListener('animationend', () => {
          if(!undone) { // chỉ thực sự xóa nếu chưa undo
            todos = todos.filter(todo => todo.id !== id);
            saveTodos();
            renderTodos();
          }
        }, { once: true });
      } else {
        todos = todos.filter(todo => todo.id !== id);
        saveTodos();
        renderTodos();
      }
      lastDeletedTodo = todoToDelete;
      if(lastDeletedTimer) { clearTimeout(lastDeletedTimer); }
      showToast('Todo deleted. ', () => { undone = true; undoDeletion(); }, 'info');
      lastDeletedTimer = setTimeout(() => { lastDeletedTodo = null; }, UNDO_DURATION);
    }

    /***************************************************
     * Function: undoDeletion
     ***************************************************/
    function undoDeletion() {
      if(lastDeletedTodo) {
        todos.push(lastDeletedTodo);
        saveTodos();
        renderTodos();
        lastDeletedTodo = null;
        if(lastDeletedTimer) { clearTimeout(lastDeletedTimer); }
        showToast('Deletion undone.', null, 'success');
      }
    }

    /***************************************************
     * Function: toggleComplete
     ***************************************************/
    function toggleComplete(id) {
      todos = todos.map(todo => {
        if(todo.id === id) { todo.completed = !todo.completed; }
        return todo;
      });
      saveTodos();
      renderTodos();
    }

    /***************************************************
     * Function: openEditModal
     ***************************************************/
    function openEditModal(id) {
      editTodoId = id;
      const todo = todos.find(t => t.id === id);
      if(todo) {
        editTodoInput.value = todo.text;
        editModal.classList.add('active');
        editTodoInput.focus();
      }
    }

    /***************************************************
     * Function: closeEditModal
     ***************************************************/
    function closeEditModal() {
      editModal.classList.remove('active');
      editTodoInput.value = '';
      editTodoId = null;
    }

    /***************************************************
     * Function: saveEditedTodo
     ***************************************************/
    function saveEditedTodo() {
      const newText = editTodoInput.value.trim();
      if(newText.length < MIN_LENGTH || newText.length > MAX_LENGTH) {
        showToast(`Todo must be between ${MIN_LENGTH} and ${MAX_LENGTH} characters.`, null, 'error');
        return;
      }
      if(!isValidTodo(newText)) {
        showToast('Invalid characters or todo cannot start with punctuation.', null, 'error');
        return;
      }
      todos = todos.map(todo => {
        if(todo.id === editTodoId) { todo.text = newText; }
        return todo;
      });
      saveTodos();
      renderTodos();
      closeEditModal();
      showToast('Todo updated.', null, 'success');
    }

    /***************************************************
     * Function: clearCompletedTodos
     ***************************************************/
    function clearCompletedTodos() {
      const hasCompleted = todos.some(todo => todo.completed);
      if(!hasCompleted) {
        showToast('No completed todos to clear.', null, 'info');
        return;
      }
      todos = todos.filter(todo => !todo.completed);
      saveTodos();
      renderTodos();
      showToast('Completed todos cleared.', null, 'success');
    }

    /***************************************************
     * Function: showToast (with type: success/error/info)
     ***************************************************/
    function showToast(message, undoCallback = null, type = 'info') {
      const toast = document.createElement('div');
      toast.className = `toast toast-${type}`;

      const iconMap = { success: 'fa-check-circle', error: 'fa-times-circle', info: 'fa-info-circle' };
      const icon = document.createElement('i');
      icon.className = `fas ${iconMap[type] || iconMap.info}`;
      toast.appendChild(icon);

      const msgSpan = document.createElement('span');
      msgSpan.textContent = message;
      toast.appendChild(msgSpan);

      if(undoCallback) {
        const undoBtn = document.createElement('button');
        undoBtn.style.marginLeft = '10px';
        undoBtn.style.background = 'transparent';
        undoBtn.style.border = 'none';
        undoBtn.style.color = '#a7f3d0';
        undoBtn.style.cursor = 'pointer';
        undoBtn.style.fontWeight = '500';
        undoBtn.textContent = 'Undo';
        undoBtn.addEventListener('click', () => {
          undoCallback();
          toast.remove();
        });
        toast.appendChild(undoBtn);
      }
      toastContainer.appendChild(toast);
      setTimeout(() => { toast.remove(); }, 3500);
    }

    /***************************************************
     * Function: setFilter
     ***************************************************/
    function setFilter(filter) {
      currentFilter = filter;
      filterButtons.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      renderTodos();
    }

    /***************************************************
     * Event Listeners Setup
     ***************************************************/
    addTodoBtn.addEventListener('click', addTodo);
    todoInput.addEventListener('keypress', e => { if(e.key === 'Enter') addTodo(); });
    cancelEditBtn.addEventListener('click', closeEditModal);
    saveEditBtn.addEventListener('click', saveEditedTodo);
    clearCompletedBtn.addEventListener('click', clearCompletedTodos);
    filterButtons.forEach(btn => { btn.addEventListener('click', () => setFilter(btn.dataset.filter)); });
    editModal.addEventListener('click', e => { if(e.target === editModal) closeEditModal(); });

    // Initialize the application on page load
    init();
  </script>
</body>
</html>
